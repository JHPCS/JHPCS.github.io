<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Melissa 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #ffe4ec, #ffc1d6, #ff9bb8);
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      border-radius: 30px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 70px rgba(255, 105, 150, 0.35);
      position: relative;
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      color: #ff4f87;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    button {
      border: none;
      padding: 16px 32px;
      font-size: 1.1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 600;
    }

    .yes {
      background: linear-gradient(135deg, #ff4f87, #ff7aa5);
      color: white;
      box-shadow: 0 10px 25px rgba(255, 79, 135, 0.4);
    }

    .yes:hover {
      transform: scale(1.12);
    }

    .no {
      background: #f1f1f1;
      color: #777;
      position: relative;
    }

    .heart {
      position: absolute;
      color: #ff6fa3;
      font-size: 20px;
      animation: floatUp linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-120vh) scale(1.3); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container" id="box">
    <h1>Melissa, will you be my girlfriend?</h1>
    <div class="buttons">
      <button class="yes" onclick="heartsBurst()">Yes 💖</button>
      <button class="no" onmouseover="runAway(this)">No</button>
    </div>
  </div>

  <script>
    function runAway(btn) {
      const box = document.getElementById('box');
      const rect = box.getBoundingClientRect();
      const x = Math.random() * (rect.width - btn.offsetWidth);
      const y = Math.random() * (rect.height - btn.offsetHeight);
      btn.style.position = 'absolute';
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (4 + Math.random() * 3) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }

    function heartsBurst() {
      for (let i = 0; i < 40; i++) {
        setTimeout(createHeart, i * 80);
      }
    }

    setInterval(createHeart, 800);
  </script>
</body>
</html>
