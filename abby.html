<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Abby 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffd1dc);
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 50px 40px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255, 105, 135, 0.25);
      max-width: 420px;
      width: 90%;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      color: #ff5c8a;
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 1.05rem;
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 26px;
      font-size: 1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 600;
    }

    .yes {
      background: #ff5c8a;
      color: white;
      box-shadow: 0 8px 20px rgba(255, 92, 138, 0.35);
    }

    .yes:hover {
      transform: scale(1.08);
    }

    .no {
      background: #eee;
      color: #777;
      position: relative;
    }

    .heart {
      position: absolute;
      color: #ff7aa5;
      font-size: 18px;
      animation: rise 6s linear infinite;
      opacity: 0.7;
    }

    @keyframes rise {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
    }

    .hidden {
      display: none;
    }

    .success {
      font-family: 'Pacifico', cursive;
      font-size: 1.8rem;
      color: #ff5c8a;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Abby 💕</h1>
    <p>Will you be my girlfriend?</p>

    <div class="buttons" id="buttons">
      <button class="yes" onclick="sayYes()">Yes 💗</button>
      <button class="no" onmouseover="moveNo(this)">No</button>
    </div>

    <div id="success" class="hidden">
      <div class="success">YAY!! 🥹💖</div>
      <p>You just made me the happiest person ever.</p>
    </div>
  </div>

  <script>
    function sayYes() {
      document.getElementById('buttons').style.display = 'none';
      document.getElementById('success').classList.remove('hidden');
      burstHearts();
    }

    function moveNo(btn) {
      const card = document.getElementById('card');
      const rect = card.getBoundingClientRect();
      const maxX = rect.width - btn.offsetWidth - 20;
      const maxY = rect.height - btn.offsetHeight - 20;
      btn.style.position = 'absolute';
      btn.style.left = Math.random() * maxX + 'px';
      btn.style.top = Math.random() * maxY + 'px';
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (4 + Math.random() * 4) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 8000);
    }

    function burstHearts() {
      for (let i = 0; i < 25; i++) {
        setTimeout(createHeart, i * 120);
      }
    }

    setInterval(createHeart, 900);
  </script>
</body>
</html>
